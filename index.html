<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaninoTL Dashboard</title>

  https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .device {
      background: #1e293b;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      cursor: pointer;
    }

    .content {
      padding: 12px;
      border-top: 1px solid #334155;
      display: none;
    }

    .open .content {
      display: block;
    }

    .error { border-left: 5px solid red; }
    .warn { border-left: 5px solid orange; }
    .ok { border-left: 5px solid limegreen; }
    .idle { border-left: 5px solid deepskyblue; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>📡 PaninoTL Dashboard</h1>
<div id="devices"></div>

<script>
const client = mqtt.connect(
  "wss://63f5450f2daa43c191b14e9602fcf094.s1.eu.hivemq.cloud:8884/mqtt",
  {
    username: "dashboard",
    password: "WebDashboard2026"
  }
);

const devices = {};
const notified = {};
const openState = {};

client.on("connect", () => {
  console.log("✅ Connected");
  client.subscribe("#");
});

client.on("message", (topic, message) => {
  try {
    const data = JSON.parse(message.toString());
    const id = data.status.deviceId;

    devices[id] = {
      ...data.status,
      config: data.config,
      lastUpdate: Date.now()
    };
  } catch (e) {
    console.log("Invalid message");
  }
});

function batteryColor(p) {
  return p > 60 ? "limegreen" : p > 30 ? "orange" : "red";
}

function lastSeen(t) {
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 10) return "now";
  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff / 60) + "m";
  return Math.floor(diff / 3600) + "h";
}

function nextExpected(d) {
  const last = new Date(d.lastShotOk.replace(" ", "T"));
  return new Date(last.getTime() + d.config.interval * 1000);
}

function status(dev, id) {
  const next = nextExpected(dev);
  const now = new Date();
  const buffer = dev.config.interval * 1.5;

  const gap = (next - now) / 1000;
  if (gap > buffer * 2) return "idle";

  if (now <= next) {
    notified[id] = false;
    return "ok";
  }

  const diff = (now - next) / 1000;

  if (diff <= buffer) return "warn";

  if (!notified[id]) {
    if (Notification.permission === "granted") {
      new Notification("Device " + id + " missed check");
    }
    notified[id] = true;
  }

  return "error";
}

function renderDays(daysStr) {
  const days = ["M","T","W","T","F","S","S"];
  return days.map((d, i) => {
    return daysStr[i] === d
      ? `<span style="color:limegreen">✔ ${d}</span>`
      : `<span style="opacity:0.3">✖ ${d}</span>`;
  }).join(" ");
}

function toggle(el) {
  const id = el.querySelector("b").innerText;

  el.classList.toggle("open");
  openState[id] = el.classList.contains("open");
}

function render() {
  const container = document.getElementById("devices");
  container.innerHTML = "";

  Object.keys(devices).forEach(id => {
    const d = devices[id];
    const s = status(d, id);

    const dev = document.createElement("div");
    dev.className = "device " + s;

    // ✅ auto-open errors
    if (s === "error") {
      dev.classList.add("open");
    }

    // ✅ restore manual state
    if (openState[id]) {
      dev.classList.add("open");
    }

    const isError = d.lastError !== "None";

    dev.innerHTML = `
      <div class="header" onclick="toggle(this.parentElement)">
        <b>${id}</b>
        <span>${s.toUpperCase()} • 🔋 ${d.batteryPct}%</span>
      </div>

      <div class="content">
        <div class="row"><span>Photos</span><span>${d.sdPhotoCount}</span></div>
        <div class="row"><span>Last Shot</span><span>${d.lastShotOk}</span></div>
        <div class="row"><span>Last Seen</span><span>${lastSeen(d.lastUpdate)}</span></div>
        <div class="row"><span>Next Expected</span><span>${nextExpected(d).toLocaleTimeString()}</span></div>

        <hr style="border-color:#334155; margin:8px 0;">

        <div class="row"><span>Interval</span><span>${d.config.interval}s</span></div>
        <div class="row"><span>Window</span><span>${d.config.start} → ${d.config.end}</span></div>

        <div style="margin-top:8px; font-size:13px;">
          <div>Schedule:</div>
          <div>${renderDays(d.config.days)}</div>
        </div>

        <hr style="border-color:#334155; margin:8px 0;">

        <div style="
          padding:6px;
          border-radius:6px;
          background:${isError ? "#3b0000" : "#002b00"};
          color:${isError ? "red" : "limegreen"};
        ">
          <b>Error:</b> ${d.lastError}
        </div>
      </div>
    `;

    container.appendChild(dev);
  });
}

setInterval(render, 1000);

if (Notification.permission !== "granted") {
  Notification.requestPermission();
}
</script>

</body>
</html>
