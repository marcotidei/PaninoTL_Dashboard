<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaninoTL Dashboard</title>

  <!-- ✅ MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- ✅ FontAwesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .device {
      background: #1e293b;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      cursor: pointer;
    }

    .content {
      padding: 12px;
      border-top: 1px solid #334155;
      display: none;
    }

    .open .content {
      display: block;
    }

    .error { border-left: 5px solid red; }
    .warn { border-left: 5px solid orange; }
    .ok { border-left: 5px solid limegreen; }
    .idle { border-left: 5px solid deepskyblue; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 14px;
    }

    .sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section {
      display: flex;
      gap: 10px;
      background: #0b1220;
      padding: 10px;
      border-radius: 8px;
      align-items: flex-start;
    }

    .section-icon {
      font-size: 34px;
      min-width: 32px;
      text-align: center;
      opacity: 0.8;
    }

    .section-icon i {
      font-size: inherit;
    }

    .section-body {
      flex: 1;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    .section-title i {
      opacity: 0.8;
    }

    @media (min-width: 700px) {
      .sections {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

<h1>📡 PaninoTL Dashboard</h1>
<div id="devices"></div>

<script>
const client = mqtt.connect(
  "wss://63f5450f2daa43c191b14e9602fcf094.s1.eu.hivemq.cloud:8884/mqtt",
  {
    username: "dashboard",
    password: "WebDashboard2026"
  }
);

const devices = {};
const notified = {};
const openState = {};

client.on("connect", () => {
  console.log("✅ Connected");
  client.subscribe("#");
});

client.on("message", (topic, message) => {
  try {
    const data = JSON.parse(message.toString());
    const id = data.status.deviceId;

    devices[id] = {
      ...data.status,
      config: data.config,
      lastSeenDevice: data.status.time
    };
  } catch {}
});

function relativeTime(ts) {
  if (!ts) return "-";

  const t = new Date(ts.replace(" ", "T"));
  const diff = Math.floor((Date.now() - t) / 1000);

  if (diff < 10) return "now";
  if (diff < 60) return diff + "s";
  if (diff < 3600) return Math.floor(diff / 60) + "m";
  return Math.floor(diff / 3600) + "h";
}

function formatTime(ts) {
  if (!ts) return "-";

  const t = typeof ts === "string"
    ? new Date(ts.replace(" ", "T"))
    : ts;

  return t.toLocaleTimeString();
}

function nextExpected(d) {
  if (!d.lastShotOk || !d.config?.interval) return null;

  const last = new Date(d.lastShotOk.replace(" ", "T"));
  return new Date(last.getTime() + d.config.interval * 1000);
}

function status(dev, id) {
  const next = nextExpected(dev);
  const now = new Date();
  const buffer = dev.config.interval * 1.5;

  const gap = (next - now) / 1000;
  if (gap > buffer * 2) return "idle";

  if (now <= next) {
    notified[id] = false;
    return "ok";
  }

  const diff = (now - next) / 1000;

  if (diff <= buffer) return "warn";

  if (!notified[id]) {
    if (Notification.permission === "granted") {
      new Notification("Device " + id + " missed check");
    }
    notified[id] = true;
  }

  return "error";
}

function isRecentError(d) {
  if (!d.lastErrorTime || d.lastError === "None") return false;

  const errTime = new Date(d.lastErrorTime.replace(" ", "T"));
  const lastOk = new Date(d.lastShotOk.replace(" ", "T"));

  return errTime > lastOk;
}

function lensName(id) {
  switch (id) {
    case 101: return "Wide";
    case 102: return "Linear";
    case 19:  return "Narrow";
    case 31:  return "Wide 27 MP";
    case 32:  return "Linear 27 MP";
    case 40:  return "Ultra Wide 13MP";
    case 44:  return "Ultra Linear 13MP";
    default:  return "Unknown";
  }
}

function photoOutputName(id) {
  switch (id) {
    case 0: return "Standard";
    case 1: return "RAW";
    case 2: return "HDR";
    case 3: return "SuperPhoto";
    default: return "Unknown";
  }
}

function renderDays(daysStr) {
  const labels = ["M","T","W","T","F","S","S"];
  return labels.map((label, i) => {
    const active = daysStr[i] !== undefined;
    return active
      ? `<span style="color:limegreen">✔ ${label}</span>`
      : `<span style="opacity:0.3">✖ ${label}</span>`;
  }).join(" ");
}

function toggle(el) {
  const id = el.querySelector("b").innerText;
  el.classList.toggle("open");
  openState[id] = el.classList.contains("open");
}

function render() {
  const container = document.getElementById("devices");
  container.innerHTML = "";

  Object.keys(devices).forEach(id => {
    const d = devices[id];
    const s = status(d, id);

    const dev = document.createElement("div");
    dev.className = "device " + s;

    if (s === "error") dev.classList.add("open");
    if (openState[id]) dev.classList.add("open");

    const isError = d.lastError !== "None";

    dev.innerHTML = `
      <div class="header" onclick="toggle(this.parentElement)">
        <b>${id}</b>
        <span>
          <div class="header" onclick="toggle(this.parentElement)">
            <b>${id}</b>

            <span style="display:flex; align-items:center; gap:6px;">

              <i class="fa-solid ${
                s === "error" ? "fa-circle-xmark" :
                s === "warn" ? "fa-triangle-exclamation" :
                s === "ok" ? "fa-circle-check" :
                "fa-clock"
              }"
              style="
                color:
                  ${s === "error" ? "red" :
                  s === "warn" ? "orange" :
                  s === "ok" ? "limegreen" :
                  "#94a3b8"};
              "></i>

              ${s.toUpperCase()} • 🔋 ${d.batteryPct}%

            </span>
          </div>
          ${s.toUpperCase()} • 🔋 ${d.batteryPct}%
        </span>
      </div>

      <div class="content">

        <div class="sections">

          <div class="section">
            <div class="section-icon">
              <i class="fa-solid fa-heart-pulse"></i>
            </div>

            <div class="section-body">
              <div class="row"><span>Last Seen</span><span>${relativeTime(d.lastSeenDevice)}</span></div>
              <div class="row"><span>Next</span><span>${formatTime(nextExpected(d))}</span></div>
              <div class="row"><span>Status</span><span>${s.toUpperCase()}</span></div>

              ${(() => {
                const recent = isRecentError(d);
                const hasError = d.lastError && d.lastError !== "None";

                if (!hasError) {
                  return `<div style="margin-top:6px; color:limegreen;">✅ No errors</div>`;
                }

                return `
                  <div style="
                    margin-top:6px;
                    padding:6px;
                    border-radius:6px;
                    background:${recent ? "#550000" : "#222"};
                    color:${recent ? "red" : "#aaa"};
                    ${recent ? "box-shadow:0 0 8px red;" : ""}
                  ">
                    <div><b>Error:</b> ${d.lastError}</div>
                    <div style="font-size:12px;">${d.lastErrorTime || "-"}</div>
                  </div>
                `;
              })()}
            </div>
          </div>

          <div class="section">
            <div class="section-icon">
              <i class="fa-solid fa-calendar-days"></i>
            </div>

            <div class="section-body">
              <div>${renderDays(d.config.days)}</div>
              <div class="row"><span>Window</span><span>${d.config.start} → ${d.config.end}</span></div>
              <div class="row"><span>Interval</span><span>${d.config?.interval ?? "-"}s</span></div>
            </div>
          </div>

          <div class="section">
            <div class="section-icon">
              <i class="fa-solid fa-camera"></i>
            </div>

            <div class="section-body">
              <div class="row"><span>Photos</span><span>${d.sdPhotoCount}</span></div>
              <div class="row"><span>Last Shot</span><span>${formatTime(d.lastShotOk)}</span></div>

              <div class="row"><span>Lens</span><span>${lensName(d.config.lens)}</span></div>
              <div class="row"><span>Output</span><span>${photoOutputName(d.config.output)}</span></div>
            </div>
          </div>

        </div>

      </div>
    `;

    container.appendChild(dev);
  });
}

setInterval(render, 1000);

if (Notification.permission !== "granted") {
  Notification.requestPermission();
}
</script>

</body>
</html>
