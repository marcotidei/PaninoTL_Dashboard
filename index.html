<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaninoTL - Dashboard</title>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- FontAwesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    /* page layout */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar h1 {
      margin: 0;
    }

    #toggleAllBtn {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #toggleAllBtn:hover {
      background: #334155;
    }

    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* device card and header */
    .device {
      background: #1e293b;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
      padding: 12px 14px;
      cursor: pointer;
    }

    .header span i {
      font-size: 16px;
    }

    .content {
      padding: 12px;
      border-top: 1px solid #334155;
      display: none;
    }

    .open .content {
      display: block;
    }

    /* status indicator border colors */
    .error { border-left: 5px solid red; }
    .warn  { border-left: 5px solid orange; }
    .ok    { border-left: 5px solid limegreen; }
    .idle  { border-left: 5px solid deepskyblue; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 14px;
    }

    /* section cards inside each device detail panel */
    .sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section {
      display: flex;
      gap: 16px;
      background: #0b1220;
      padding: 10px 10px 10px 12px;
      border-radius: 8px;
      align-items: flex-start;
    }

    .section-icon {
      font-size: 48px;
      width: 56px;
      flex-shrink: 0;
      text-align: center;
      opacity: 0.8;
    }

    .section-icon i {
      font-size: inherit;
    }

    .section-body {
      flex: 1;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    .section-title i {
      opacity: 0.8;
    }

    /* responsive layout */
    @media (min-width: 700px) {
      .sections {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>PaninoTL - Dashboard</h1>
  <button id="toggleAllBtn" onclick="toggleAllPanels()">Expand all</button>
</div>

<div id="devices"></div>

<script>

  // --------------------------------------------------------
  // MQTT connection and shared state
  // --------------------------------------------------------
  const client = mqtt.connect(
    "wss://63f5450f2daa43c191b14e9602fcf094.s1.eu.hivemq.cloud:8884/mqtt",
    {
      username: "dashboard",
      password: "WebDashboard2026"
    }
  );

  const devices    = {};          // live device state by deviceId
  const notified   = {};          // error notification tracking
  const openState  = {};          // expanded card state per device
  const GRACE_SECONDS = 120;      // communication grace period in seconds
  let expandAll    = false;       // global toggle for expanding/collapsing all device panels

  client.on("connect", () => {
    console.log("✅ Connected");
    client.subscribe("#");
  });

  client.on("message", (topic, message) => {
    try {
      const parts = topic.split("/");

      // only accept panino/<id>/state
      if (parts.length < 3 || parts[2] !== "state") return;

      const data = JSON.parse(message.toString());
      const id = parts[1];

      const s = data.s || {};
      const c = data.c || {};
      const g = data.g || {};

      devices[id] = {
        id,
        time: s.t,
        batteryPct: (typeof s.b === "number") ? s.b : 0,
        wifiQuality: (typeof s.wq === "number") ? s.wq : 0,
        sdPhotoCount: (typeof s.pc === "number") ? s.pc : 0,
        photosFailed: (typeof s.pf === "number") ? s.pf : 0,
        lastShotOk: s.ok,
        lastCaptureFail: s.cf,
        lastError: s.err,
        lastErrorTime: s.et,
        config: {
          interval: c.i,
          days: c.d,
          start: c.s,
          end: c.e,
          lens: c.l,
          output: c.o
        },
        gopro: g,
        lastSeenDevice: s.t
      };

    } catch {}
  });


  // --------------------------------------------------------
  // Date/time formatting helpers
  // --------------------------------------------------------
  function parseTS(ts) {
    if (!ts || ts === "-") return null;

    const m = ts.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/);
    if (!m) return null;

    return new Date(
      Number(m[1]),
      Number(m[2]) - 1,
      Number(m[3]),
      Number(m[4]),
      Number(m[5]),
      Number(m[6])
    );
  }

  function relativeTime(ts) {
    if (!ts) return "-";

    const t = parseTS(ts);
    if (!t || isNaN(t)) return "-";

    const diff = Math.floor((Date.now() - t.getTime()) / 1000);

    if (diff < 10) return "now";
    if (diff < 60) return diff + "s";
    if (diff < 3600) return Math.floor(diff / 60) + "m";
    return Math.floor(diff / 3600) + "h";
  }

  function formatTime(ts) {
    if (!ts || ts === "-") return "-";

    const t = ts instanceof Date ? ts : parseTS(ts);
    if (!t || isNaN(t)) return "-";

    return t.toLocaleTimeString();
  }

  function formatDateTime(ts) {
    if (!ts || ts === "-") return "-";

    const t = ts instanceof Date ? ts : parseTS(ts);
    if (!t || isNaN(t)) return "-";

    return t.toLocaleString();
  }

  function isScheduleActiveNow(d, now = new Date()) {
    if (!d.config || !d.config.days || !d.config.start || !d.config.end) return false;

    const days = d.config.days; // e.g. "MTWTFSS" with "-" for inactive
    if (!days || days.length < 7) return false;

    // JS getDay(): Sun=0 ... Sat=6
    // Dashboard days string: Mon=0 ... Sun=6
    const dowMon0 = (now.getDay() + 6) % 7;
    const prevDow = (dowMon0 + 6) % 7;

    const curMin = now.getHours() * 60 + now.getMinutes();

    const parseHHMM = (hhmm) => {
      if (!hhmm || typeof hhmm !== "string" || hhmm.length < 5) return null;
      const hh = Number(hhmm.substring(0, 2));
      const mm = Number(hhmm.substring(3, 5));
      if (Number.isNaN(hh) || Number.isNaN(mm)) return null;
      return hh * 60 + mm;
    };

    const startMin = parseHHMM(d.config.start);
    const endMin   = parseHHMM(d.config.end);

    if (startMin == null || endMin == null) return false;

    const wraps = startMin >= endMin;

    if (!wraps) {
      return (days[dowMon0] && days[dowMon0] !== "-") &&
            curMin >= startMin &&
            curMin < endMin;
    }

    // wrapped window, e.g. 09:10 -> 09:00 next day
    const todayActive = (days[dowMon0] && days[dowMon0] !== "-");
    const prevActive  = (days[prevDow] && days[prevDow] !== "-");

    if (todayActive && curMin >= startMin) return true;
    if (prevActive  && curMin < endMin)    return true;

    return false;
  }

  function nextExpectedComm(d) {
    if (!d.lastSeenDevice || !d.config || !d.config.interval) return null;

    const last = parseTS(d.lastSeenDevice);
    if (!last || isNaN(last)) return null;

    return new Date(last.getTime() + d.config.interval * 1000);
  }

function hhmmToSeconds(hhmm) {
  if (!hhmm) return 0;
  const [h, m] = hhmm.split(":").map(Number);
  return h * 3600 + m * 60;
}

function dayIndexMon0(jsDay) {
  return (jsDay + 6) % 7; // JS: Sun=0 ... Sat=6 -> Mon=0 ... Sun=6
}

function isDayActive(days, date) {
  if (!days || days.length < 7) return false;
  return days[dayIndexMon0(date.getDay())] !== "-";
}

function isInsideWindow(d, date) {
  if (!d.config || !d.config.days) return false;

  const startSec = hhmmToSeconds(d.config.start);
  const endSec   = hhmmToSeconds(d.config.end);
  const curSec   = date.getHours() * 3600 + date.getMinutes() * 60 + date.getSeconds();
  const wraps    = startSec >= endSec;

  if (!wraps) {
    return isDayActive(d.config.days, date) && curSec >= startSec && curSec < endSec;
  }

  const prev = new Date(date);
  prev.setDate(prev.getDate() - 1);

  return (
    (isDayActive(d.config.days, date) && curSec >= startSec) ||
    (isDayActive(d.config.days, prev) && curSec < endSec)
  );
}

function nextScheduledConnection(d, from = new Date()) {
  if (!d.config || !d.config.interval) return null;

  const intervalMs = d.config.interval * 1000;
  const search = new Date(from);

  for (let i = 0; i < 8 * 24 * 60; i++) {
    const t = new Date(search.getTime() + i * 60000);

    const midnight = new Date(t);
    midnight.setHours(0, 0, 0, 0);

    const elapsedMs = t.getTime() - midnight.getTime();
    const nextElapsedMs = Math.ceil(elapsedMs / intervalMs) * intervalMs;
    const candidate = new Date(midnight.getTime() + nextElapsedMs);

    if (candidate <= from) continue;
    if (isInsideWindow(d, candidate)) return candidate;
  }

  return null;
}

function latestDueConnection(d, now = new Date()) {
  if (!d.config || !d.config.interval) return null;

  const intervalMs = d.config.interval * 1000;
  const midnight = new Date(now);
  midnight.setHours(0, 0, 0, 0);

  const elapsedMs = now.getTime() - midnight.getTime();
  const dueElapsedMs = Math.floor(elapsedMs / intervalMs) * intervalMs;
  const candidate = new Date(midnight.getTime() + dueElapsedMs);

  if (isInsideWindow(d, candidate)) return candidate;
  return null;
}


  // --------------------------------------------------------
  // Device health and error helpers
  // --------------------------------------------------------
  function status(dev, id) {
    const now = new Date();

    // Outside active schedule -> no communication expected
    if (!isScheduleActiveNow(dev, now)) {
      notified[id] = false;
      return "idle";
    }

    const next = latestDueConnection(dev);
    if (!next || !dev.config || !dev.config.interval) {
      return "idle";
    }

    const intervalSec = dev.config.interval;
    const grace       = GRACE_SECONDS;

    const nextMs  = next.getTime();
    const warnMs  = nextMs + grace * 1000;
    const errorMs = nextMs + intervalSec * 1000 + grace * 1000;

    if (now.getTime() <= warnMs) {
      notified[id] = false;
      return "ok";
    }

    if (now.getTime() < errorMs) {
      return "warn";
    }

    if (!notified[id]) {
      if (
        typeof Notification !== "undefined" &&
        Notification.permission === "granted"
      ) {
        new Notification("Device " + id + " communication lost");
      }
      notified[id] = true;
    }

    return "error";
  }

  function isRecentError(d) {
    if (!d.lastErrorTime || d.lastError === "None") return false;

    const err = parseTS(d.lastErrorTime);
    if (!err || isNaN(err)) return false;

    if (!d.lastShotOk || d.lastShotOk === "-") {
      return true;
    }

    const shot = parseTS(d.lastShotOk);
    if (!shot || isNaN(shot)) return true;

    return err.getTime() > shot.getTime();
  }

    function effectiveErrorInfo(d, id, statusLevel) {
      const next = latestDueConnection(d);

      // Communication problems always override shooting/capture errors
      if (statusLevel === "warn" && next && d.config) {
        return {
          hasError: true,
          text: "COMM DELAY",
          time: new Date(next.getTime() + GRACE_SECONDS * 1000),
          bg: "#3a2500",
          color: "orange",
          glow: false
        };
      }

      if (statusLevel === "error" && next && d.config && d.config.interval) {
        return {
          hasError: true,
          text: "COMM LOST",
          time: new Date(next.getTime() + (d.config.interval + GRACE_SECONDS) * 1000),
          bg: "#550000",
          color: "red",
          glow: true
        };
      }

      // Only surface capture/shooting errors when communication is healthy
      const hasJsonError    = d.lastError && d.lastError !== "None";
      const recentJsonError = hasJsonError && isRecentError(d);

      return {
        hasError: hasJsonError,
        text:     hasJsonError ? d.lastError : "No errors",
        time:     hasJsonError ? d.lastErrorTime : "-",
        bg:       recentJsonError ? "#550000" : "#222",
        color:    recentJsonError ? "red" : "#aaa",
        glow:     recentJsonError
      };
    }

  // --------------------------------------------------------
  // Mapping helpers for camera metadata
  // --------------------------------------------------------
  function lensName(id) {
    switch (id) {
      case 101: return "Wide";
      case 102: return "Linear";
      case 19:  return "Narrow";
      case 31:  return "Wide 27 MP";
      case 32:  return "Linear 27 MP";
      case 40:  return "Ultra Wide 13MP";
      case 44:  return "Ultra Linear 13MP";
      default:  return "Unknown";
    }
  }

  function photoOutputName(id) {
    switch (id) {
      case 0: return "Standard";
      case 1: return "RAW";
      case 2: return "HDR";
      case 3: return "SuperPhoto";
      default: return "Unknown";
    }
  }

  function goproModelName(code) {
    switch (code) {
      case 10: return "HERO10 Black";
      case 11: return "HERO11 Black";
      case 12: return "HERO12 Black";
      case 13: return "HERO13 Black";
      default: return "-";
    }
  }

  function wifiQualityLabel(q) {
    const v = Number(q ?? 0);

    if (v <= 0)  return "Offline";
    if (v >= 80) return "Excellent";
    if (v >= 60) return "Good";
    if (v >= 40) return "Fair";
    return "Weak";
  }

  function wifiQualityColor(q) {
    const v = Number(q ?? 0);

    if (v <= 0)  return "#64748b";  // slate
    if (v >= 60) return "#e2e8f0";  // normal light text
    if (v >= 40) return "orange";
    return "red";
  }

  function renderDays(daysStr) {
    const labels = ["M","T","W","T","F","S","S"];

    return labels.map((label, i) => {
      const active = !!daysStr && daysStr[i] && daysStr[i] !== "-";
      return active
        ? `<span style="color:white;">${label}</span>`
        : `<span style="color:#475569;">${label}</span>`;
    }).join(" ");
  }

  // --------------------------------------------------------
  // FIX 2 — Error block extracted to a named function.
  // The original code used an IIFE (immediately-invoked function
  // expression) inside a template literal assigned to innerHTML:
  //   ${ (() => { ... })() }
  // iOS Safari 15 and earlier has known parsing issues with this
  // pattern inside innerHTML strings. Moving it to a regular named
  // function called as a normal expression eliminates the problem.
  // --------------------------------------------------------
  function errorBlock(err) {
    if (!err.hasError) {
      return `<div style="margin-top:6px; color:limegreen;">No errors</div>`;
    }

    return `
      <div style="
        margin-top:6px;
        padding:6px;
        border-radius:6px;
        background:${err.bg};
        color:${err.color};
        ${err.glow ? "box-shadow:0 0 8px red;" : ""}
      ">
        <div><b>Error:</b> ${err.text}</div>
        <div style="font-size:12px;">${formatDateTime(err.time)}</div>
      </div>
    `;
  }

  // --------------------------------------------------------
  // UI interaction helpers
  // --------------------------------------------------------
  function toggle(el) {
    const id = el.querySelector("b").innerText;
    el.classList.toggle("open");
    openState[id] = el.classList.contains("open");
  }

  function toggleAllPanels() {
    expandAll = !expandAll;

    const btn = document.getElementById("toggleAllBtn");
    btn.innerText = expandAll ? "Compact" : "Expand all";

    // Sync openState for every known device so the 1s render loop
    // doesn't fight the button: true when expanding, false when compacting.
    Object.keys(devices).forEach(id => {
      openState[id] = expandAll;
    });

    render();
  }

  function render() {
    const container = document.getElementById("devices");
    container.innerHTML = "";

    Object.keys(devices).forEach(id => {
      const d = devices[id];
      if (!d.config) return;   // prevents crashes on incomplete payloads

      const s = status(d, id);

      const dev = document.createElement("div");
      dev.className = "device " + s;

      // Use explicit per-device state when available, otherwise fall back to global expandAll.
      const isOpen = openState.hasOwnProperty(id)
        ? openState[id]
        : expandAll;

      if (isOpen || s === "error") {
        dev.classList.add("open");
      }

      const err = effectiveErrorInfo(d, id, s);

      dev.innerHTML = `
        <div class="header" onclick="toggle(this.parentElement)">
          <b>${id}</b>
            <span style="display:flex; align-items:center; gap:10px;">
            ${s !== "ok" ? `
              <i class="fa-solid ${
                s === "error" ? "fa-circle-xmark" :
                s === "warn"  ? "fa-circle-exclamation" :
                "fa-clock"
              }"
              style="color:${
                s === "error" ? "red" :
                s === "warn"  ? "orange" :
                "#64748b"
              };"></i>

              <span>${s.toUpperCase()}</span>
            ` : ""}

            <i class="fa-solid fa-sd-card" style="color:#e2e8f0;"></i>
            <span>${d.sdPhotoCount}</span>

            <i class="fa-solid fa-wifi"
              title="Wi-Fi ${wifiQualityLabel(d.wifiQuality)} (${d.wifiQuality ?? 0}%)"
              style="color:${wifiQualityColor(d.wifiQuality)};"></i>

              <i class="fa-solid ${
                d.batteryPct >= 90 ? "fa-battery-full" :
                d.batteryPct >= 65 ? "fa-battery-three-quarters" :
                d.batteryPct >= 40 ? "fa-battery-half" :
                d.batteryPct >= 15 ? "fa-battery-quarter" :
                "fa-battery-empty"
              }"
              title="Battery ${d.batteryPct}%"
              style="color:${
                d.batteryPct >= 40 ? "#e2e8f0" :
                d.batteryPct >= 15 ? "orange" :
                "red"
              };"></i>
          </span>
        </div>

        <div class="content">

          <!-- GOPRO BAR -->
          <div style="
            background:#020617;
            padding:8px 10px;
            border-radius:8px;
            margin-bottom:10px;
            font-size:12px;
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            align-items:center;
            border:1px solid #334155;
          ">
            <b>GoPro:</b>

            <span>${goproModelName(d.gopro && d.gopro.m)}</span>

            <span style="opacity:0.6;">FW:</span>
            <span>${(d.gopro && d.gopro.fw) || "-"}</span>

            <span style="opacity:0.6;">SN:</span>
            <span>${(d.gopro && d.gopro.sn) || "-"}</span>

            <span style="opacity:0.6;">MAC:</span>
            <span>${(d.gopro && d.gopro.mac) || "-"}</span>
          </div>

          <div class="sections">

            <div class="section">
              <div class="section-icon">
                <i class="fa-solid fa-heart-pulse"></i>
              </div>
              <div class="section-body">
                <div class="row"><span>Last Comm.:</span><span>${relativeTime(d.lastSeenDevice)}</span></div>
                <div class="row">
                  <span>Wi-Fi:</span>
                  <span style="color:${wifiQualityColor(d.wifiQuality)};">
                    ${wifiQualityLabel(d.wifiQuality)} (${d.wifiQuality ?? 0}%)
                  </span>
                </div>
                <div class="row">
                  <span>Battery:</span>
                  <span style="color:${
                    d.batteryPct >= 40 ? "#e2e8f0" :
                    d.batteryPct >= 15 ? "orange" :
                    "red"
                  };">
                    ${d.batteryPct}%
                  </span>
                </div>
                <div class="row"><span>Next Comm.:</span><span>${formatDateTime(nextScheduledConnection(d))}</span></div>
                ${errorBlock(err)}
              </div>
            </div>

            <div class="section">
              <div class="section-icon">
                <i class="fa-solid fa-calendar-days"></i>
              </div>
              <div class="section-body">
                <div class="row"><span>Days of the week:</span><span>${renderDays(d.config.days)}</span></div>
                <div class="row"><span>Time Window:</span><span>${d.config.start} → ${d.config.end}</span></div>
                <div class="row"><span>Interval:</span><span>${d.config.interval ? d.config.interval + "s" : "-"}</span></div>
              </div>
            </div>

            <div class="section">
              <div class="section-icon">
                <i class="fa-solid fa-camera"></i>
              </div>
              <div class="section-body">
                <div class="row"><span>Photos:</span><span>${d.sdPhotoCount}</span></div>
                <div class="row">
                  <span>Failed Photos:</span>
                  <span style="color:${(d.photosFailed ? d.photosFailed : 0) > 0 ? 'red' : '#e2e8f0'};">
                    ${d.photosFailed ? d.photosFailed : 0}
                  </span>
                </div>
                <div class="row"><span>Last Photo:</span><span>${formatDateTime(d.lastShotOk)}</span></div>
                <div class="row"><span>Lens:</span><span>${lensName(d.config.lens)}</span></div>
                <div class="row"><span>Format:</span><span>${photoOutputName(d.config.output)}</span></div>
              </div>
            </div>
          </div>
        </div>
      `;

      container.appendChild(dev);
    });
  }

  // --------------------------------------------------------
  // Startup render loop and notification permission
  // FIX 3 — guard Notification API existence before any access.
  // --------------------------------------------------------
  render();
  setInterval(render, 1000);

  if (
    typeof Notification !== "undefined" &&
    Notification.permission !== "granted"
  ) {
    Notification.requestPermission();
  }
</script>

</body>
</html>
