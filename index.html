<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaninoTL</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>

<body>

<div class="topbar">
  <h1>PaninoTL</h1>
  <div class="topbar-actions">

    <button
      id="connectionBtn"
      class="connection-btn"
      onclick="handleConnectionClick()"
      aria-label="Connect to broker"
      title="Connect to broker"
    >
      <i id="connIcon" class="fa-solid fa-link-slash"></i>
    </button>

    <button id="toggleAllBtn" onclick="toggleAllPanels()">Expand all</button>
  </div>
</div>

<div id="devices"></div>

<div id="cameraModal" class="modal-overlay">
  <div class="modal-card modal-card-sm">
    <div class="modal-header">
      <b>Camera Information</b>
      <button class="modal-close-btn" onclick="closeCameraModal()">Close</button>
    </div>
    <div class="camera-image-frame">
      <div class="camera-image-shell">
        <img id="camImage" class="camera-image" src="" alt="" hidden>
      </div>
    </div>
    <div class="row"><span>Model:</span><span id="camInfoModel">-</span></div>
    <div class="row"><span>Firmware:</span><span id="camInfoFw">-</span></div>
    <div class="row"><span>Serial:</span><span id="camInfoSn">-</span></div>
    <div class="row"><span>MAC:</span><span id="camInfoMac">-</span></div>
  </div>
</div>

<div id="configModal" class="modal-overlay config-modal">
  <div class="modal-card modal-card-sm">

    <div class="cfg-title">
      <i class="fa-solid fa-server"></i>
      <span>MQTT Connection</span>
    </div>

    <form id="configForm" autocomplete="on" onsubmit="saveConfig(event)">
      <div class="cfg-field">
        <label for="cfg_url">Broker URL</label>
        <input
          id="cfg_url"
          name="broker_url"
          type="url"
          placeholder="wss://broker.example.com:8884"
          autocomplete="url"
          autocapitalize="none"
          spellcheck="false"
        >
      </div>

      <div class="cfg-field">
        <label for="cfg_topic_prefix">Topic Prefix</label>
        <input
          id="cfg_topic_prefix"
          name="topic_prefix"
          type="text"
          placeholder="panino"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
        >
      </div>

      <div class="cfg-field">
        <label for="cfg_user">Username</label>
        <input
          id="cfg_user"
          name="username"
          type="text"
          placeholder="username"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
        >
      </div>

      <div class="cfg-field">
        <label for="cfg_pass">Password</label>
        <input
          id="cfg_pass"
          name="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        >
      </div>

      <div class="cfg-actions">
        <button class="cfg-btn primary" type="submit">
          <i class="fa-solid fa-link cfg-btn-icon"></i>Connect
        </button>
      </div>
    </form>

  </div>
</div>

<script>
// Customize these defaults for your broker and MQTT topic layout.
const DEFAULT_BROKER_URL   = "wss://63f5450f2daa43c191b14e9602fcf094.s1.eu.hivemq.cloud:8884/mqtt";
const DEFAULT_TOPIC_PREFIX = "panino";
const DEFAULT_TOPIC_FILTER = `${DEFAULT_TOPIC_PREFIX}/+/state`;
const GRACE_SECONDS = 120;

let client        = null;
let currentConfig = null;
let connectionState = "disconnected";
let expandAll     = false;
let uiLocked      = false;

// MQTT handlers close over these objects, so clear them in place.
const devices   = {};
const notified  = {};
const openState = {};

function clearDashboardState() {
  Object.keys(devices).forEach(k   => delete devices[k]);
  Object.keys(notified).forEach(k  => delete notified[k]);
  Object.keys(openState).forEach(k => delete openState[k]);
}

function normalizeTopicPrefix(prefix) {
  return String(prefix || "").trim().replace(/^\/+|\/+$/g, "");
}

function withConfigDefaults(config) {
  config = config || {};
  return {
    ...config,
    url: config.url || DEFAULT_BROKER_URL,
    topicPrefix: normalizeTopicPrefix(config.topicPrefix) || DEFAULT_TOPIC_PREFIX
  };
}

function topicPrefix(config = currentConfig) {
  return normalizeTopicPrefix(config && config.topicPrefix) || DEFAULT_TOPIC_PREFIX;
}

function topicFilter(config = currentConfig) {
  const prefix = topicPrefix(config);
  return prefix === DEFAULT_TOPIC_PREFIX ? DEFAULT_TOPIC_FILTER : `${prefix}/+/state`;
}

function stateTopic(id, config = currentConfig) {
  return `${topicPrefix(config)}/${id}/state`;
}

function deviceIdFromTopic(topic, config = currentConfig) {
  const prefix = topicPrefix(config);
  const start  = `${prefix}/`;
  const end    = "/state";
  if (!topic.startsWith(start) || !topic.endsWith(end)) return null;

  const id = topic.slice(start.length, -end.length);
  return id && !id.includes("/") ? id : null;
}

// Config and broker credentials
async function loadConfig() {
  const saved = localStorage.getItem("mqtt_config");
  if (saved) {
    try { return withConfigDefaults(JSON.parse(saved)); } catch { localStorage.removeItem("mqtt_config"); }
  }
  return withConfigDefaults({});
}

function openConfigModal(prefill) {
  prefill = withConfigDefaults(prefill || {});
  document.getElementById("cfg_url").value = prefill.url || DEFAULT_BROKER_URL;
  document.getElementById("cfg_topic_prefix").value = prefill.topicPrefix || DEFAULT_TOPIC_PREFIX;
  if (Object.prototype.hasOwnProperty.call(prefill, "username")) {
    document.getElementById("cfg_user").value = prefill.username || "";
  }
  if (Object.prototype.hasOwnProperty.call(prefill, "password")) {
    document.getElementById("cfg_pass").value = prefill.password || "";
  }
  document.getElementById("configModal").classList.add("is-visible");
}

function loginRequired() {
  return connectionState === "disconnected" || connectionState === "error";
}

function closeConfigModal(force = false) {
  // Keep login visible when credentials are required.
  if (!force && loginRequired()) return;
  document.getElementById("configModal").classList.remove("is-visible");
}

function saveConfig(event) {
  if (event) event.preventDefault();

  const config = {
    url:      document.getElementById("cfg_url").value.trim(),
    topicPrefix: normalizeTopicPrefix(document.getElementById("cfg_topic_prefix").value),
    username: document.getElementById("cfg_user").value.trim(),
    password: document.getElementById("cfg_pass").value
  };
  if (!config.url || !config.topicPrefix || !config.username) {
    alert("Please enter broker URL, topic prefix, and username");
    return;
  }
  if (/[+#]/.test(config.topicPrefix)) {
    alert("Topic prefix cannot contain MQTT wildcards (+ or #)");
    return;
  }
  localStorage.setItem("mqtt_config", JSON.stringify(config));
  connectMQTT(config);
  closeConfigModal(true);
}

// MQTT connection
function setConnStatus(state) {
  connectionState = state;

  const icon  = document.getElementById("connIcon");
  const btn   = document.getElementById("connectionBtn");

  const map = {
    disconnected: { icon: "fa-link-slash", className: "conn-disconnected", title: "Connect to broker" },
    connecting:   { icon: "fa-link",       className: "conn-connecting",   title: "Connecting to broker" },
    reconnecting: { icon: "fa-link",       className: "conn-connecting",   title: "Reconnecting to broker" },
    connected:    { icon: "fa-link",       className: "conn-connected",    title: "Forget credentials and reconnect" },
    error:        { icon: "fa-link-slash", className: "conn-error",        title: "Reconnect to broker" },
  };

  const s = map[state] || map.disconnected;
  icon.className = `fa-solid ${s.icon}`;
  btn.className = `connection-btn ${s.className}`;
  btn.title = s.title;
  btn.setAttribute("aria-label", s.title);

  if (loginRequired()) {
    openConfigModal(currentConfig || { url: DEFAULT_BROKER_URL });
  } else if (state === "connected") {
    closeConfigModal(true);
  }
}

function disconnectMQTT() {
  if (client) {
    client.end(true);
    client = null;
  }
  clearDashboardState();
  currentConfig = null;
  setConnStatus("disconnected");
  render();
}

function handleConnectionClick() {
  const brokerUrl = (currentConfig && currentConfig.url) || DEFAULT_BROKER_URL;
  const prefix = topicPrefix(currentConfig);
  localStorage.removeItem("mqtt_config");
  disconnectMQTT();
  openConfigModal({ url: brokerUrl, topicPrefix: prefix, username: "", password: "" });
}

function connectMQTT(config) {
  config = withConfigDefaults(config);
  currentConfig = config;

  clearDashboardState();
  render();

  if (client) client.end(true);
  setConnStatus("connecting");

  const newClient = mqtt.connect(config.url, {
    username: config.username,
    password: config.password
  });
  client = newClient;

  newClient.on("connect", () => {
    if (client !== newClient) return;
    console.log("✅ Connected");
    newClient.subscribe(topicFilter(config));
    setConnStatus("connected");
  });

  newClient.on("reconnect", () => {
    if (client !== newClient) return;
    setConnStatus("reconnecting");
  });

  newClient.on("close", () => {
    if (client !== newClient) return;
    setConnStatus("disconnected");
  });

  newClient.on("error", (err) => {
    if (client !== newClient) return;
    console.error("MQTT error:", err);
    setConnStatus("error");
  });

  newClient.on("message", (topic, message) => {
    if (client !== newClient) return;

    try {
      const id = deviceIdFromTopic(topic, config);
      if (!id) return;

      // Empty retained payloads mean the broker cleared the device state.
      const raw = message.toString();
      if (!raw) return;

      const data = JSON.parse(raw);
      const s    = data.s || {};
      const c    = data.c || {};
      const g    = data.g || {};

      devices[id] = {
        id,
        batteryPct:    (typeof s.b  === "number") ? s.b  : 0,
        rtcTempC:      (typeof s.rt === "number") ? s.rt : null,
        wifiQuality:   (typeof s.wq === "number") ? s.wq : 0,
        photosSuccessful: (typeof s.pc === "number") ? s.pc : 0,
        sdPhotoCount:     (typeof s.sdpc === "number") ? s.sdpc : 0,
        photosFailed:  (typeof s.pf === "number") ? s.pf : 0,
        sdTotalMB:     (typeof s.st === "number") ? s.st : 0,
        sdFreeMB:      (typeof s.sf === "number") ? s.sf : 0,
        lastShotOk:    s.ok,
        lastCaptureFail: s.cf,
        lastError:     s.err,
        lastErrorTime: s.et,
        config: {
          interval: c.i,
          days:     c.d,
          start:    c.s,
          end:      c.e,
          lens:     c.l,
          output:   c.o
        },
        gopro:         g,
        lastSeenDevice: s.t
      };

      notified[id] = false;
    } catch (e) {
      console.error("MQTT parse error:", e);
    }
  });
}

function clearDeviceState(event, id) {
  event.stopPropagation();
  if (!client || !client.connected) { alert("Not connected to broker"); return; }
  if (!confirm(`Clear retained state for ${id}?`)) return;

  uiLocked = true;
  const topic = stateTopic(id);

  client.publish(topic, "", { retain: true }, (err) => {
    uiLocked = false;
    if (err) { console.error("Publish failed:", err); return; }
    console.log("✅ Cleared retained state for", topic);
    delete devices[id];
    delete notified[id];
    delete openState[id];
    render();
  });
}

// Time helpers
function parseTS(ts) {
  if (!ts || ts === "-") return null;
  const m = ts.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/);
  if (!m) return null;
  return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), Number(m[4]), Number(m[5]), Number(m[6]));
}

function relativeTime(ts) {
  if (!ts) return "-";
  const t = (ts instanceof Date) ? ts : parseTS(ts);
  if (!t || isNaN(t)) return "-";
  const diff = Math.floor((Date.now() - t.getTime()) / 1000);
  if (diff < 10)   return "now";
  if (diff < 60)   return diff + "s";
  if (diff < 3600) return Math.floor(diff / 60) + "m";
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

function formatDateTime(ts) {
  if (!ts || ts === "-") return "-";
  const t = (ts instanceof Date) ? ts : parseTS(ts);
  if (!t || isNaN(t)) return "-";
  return t.toLocaleString();
}

// Unit conversion helpers
function sdUsagePercent(d) {
  if (!d.sdTotalMB || d.sdTotalMB === 0) return 0;
  return Math.round(100 * (1 - (d.sdFreeMB / d.sdTotalMB)));
}

function formatTotalGB(mb) {
  if (!mb || mb <= 0) return "-";
  return Math.round(mb / 1024) + " GB";
}

function formatFreeSmart(mb) {
  if (!mb || mb <= 0) return "-";
  if (mb >= 1024) {
    const gb = mb / 1024;
    if (gb >= 100) return Math.round(gb) + " GB";
    if (gb >= 10)  return gb.toFixed(1) + " GB";
    return gb.toFixed(2) + " GB";
  }
  return Math.round(mb) + " MB";
}

// Schedule helpers
function hhmmToSeconds(hhmm) {
  if (!hhmm) return 0;
  const [h, m] = hhmm.split(":").map(Number);
  return h * 3600 + m * 60;
}

function dayIndexMon0(jsDay) {
  return (jsDay + 6) % 7;
}

function isDayActive(days, date) {
  if (!days || days.length < 7) return false;
  return days[dayIndexMon0(date.getDay())] !== "-";
}

function isInsideWindow(d, date) {
  if (!d.config || !d.config.days) return false;
  const startSec = hhmmToSeconds(d.config.start);
  const endSec   = hhmmToSeconds(d.config.end);
  const curSec   = date.getHours() * 3600 + date.getMinutes() * 60 + date.getSeconds();
  const wraps    = startSec >= endSec;

  if (!wraps) {
    return isDayActive(d.config.days, date) && curSec >= startSec && curSec < endSec;
  }
  const prev = new Date(date);
  prev.setDate(prev.getDate() - 1);
  return (
    (isDayActive(d.config.days, date) && curSec >= startSec) ||
    (isDayActive(d.config.days, prev) && curSec < endSec)
  );
}

// Device schedules are aligned to midnight; scan minute slots for the next valid one.
function nextScheduledConnection(d, from = new Date()) {
  if (!d.config || !d.config.interval) return null;
  const intervalMs = d.config.interval * 1000;
  const search     = new Date(from);

  for (let i = 0; i < 8 * 24 * 60; i++) {
    const t        = new Date(search.getTime() + i * 60000);
    const midnight = new Date(t);
    midnight.setHours(0, 0, 0, 0);
    const elapsedMs     = t.getTime() - midnight.getTime();
    const nextElapsedMs = Math.ceil(elapsedMs / intervalMs) * intervalMs;
    const candidate     = new Date(midnight.getTime() + nextElapsedMs);
    if (candidate <= from) continue;
    if (isInsideWindow(d, candidate)) return candidate;
  }
  return null;
}

// Health and status logic
function status(dev, id) {
  const now = new Date();

  if (!isInsideWindow(dev, now)) {
    notified[id] = false;
    return "idle";
  }

  // Brand-new devices can be inside schedule before their first report.
  if (!dev.lastSeenDevice || !dev.config || !dev.config.interval) return "idle";

  const lastSeen = parseTS(dev.lastSeenDevice);
  if (!lastSeen || isNaN(lastSeen)) return "idle";

  const ageSec     = (now.getTime() - lastSeen.getTime()) / 1000;
  const intervalSec = dev.config.interval;

  if (ageSec <= intervalSec + GRACE_SECONDS) {
    notified[id] = false;
    return "ok";
  }

  if (ageSec < (2 * intervalSec) + GRACE_SECONDS) return "warn";

  if (!notified[id]) {
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      new Notification("Device " + id + " communication lost");
    }
    notified[id] = true;
  }
  return "error";
}

function isRecentError(d) {
  if (!d.lastErrorTime || d.lastError === "None") return false;
  const err = parseTS(d.lastErrorTime);
  if (!err || isNaN(err)) return false;
  if (!d.lastShotOk || d.lastShotOk === "-") return true;
  const shot = parseTS(d.lastShotOk);
  if (!shot || isNaN(shot)) return true;
  return err.getTime() > shot.getTime();
}

// Communication delay/loss wins the banner, but JSON errors are still shown too.
function effectiveErrorInfo(d, id, statusLevel) {
  let commAlert = null;
  if (statusLevel === "warn" && d.lastSeenDevice && d.config && d.config.interval) {
    const lastSeen = parseTS(d.lastSeenDevice);
    if (lastSeen && !isNaN(lastSeen)) {
      commAlert = {
        text:  "COMM DELAY",
        time:  new Date(lastSeen.getTime() + (d.config.interval + GRACE_SECONDS) * 1000),
        level: "warn",
        glow:  false
      };
    }
  } else if (statusLevel === "error" && d.lastSeenDevice && d.config && d.config.interval) {
    const lastSeen = parseTS(d.lastSeenDevice);
    if (lastSeen && !isNaN(lastSeen)) {
      commAlert = {
        text:  "COMM LOST",
        time:  new Date(lastSeen.getTime() + ((2 * d.config.interval) + GRACE_SECONDS) * 1000),
        level: "error",
        glow:  true
      };
    }
  }

  const hasJsonError    = !!(d.lastError && d.lastError !== "None");
  const recentJsonError = hasJsonError && isRecentError(d);

  if (commAlert) {
    return {
      hasError:      true,
      text:          commAlert.text,
      time:          commAlert.time,
      level:         commAlert.level,
      glow:          commAlert.glow,
      jsonError:     hasJsonError ? d.lastError : null,
      jsonErrorTime: hasJsonError ? d.lastErrorTime : null
    };
  }

  return {
    hasError:      hasJsonError,
    text:          hasJsonError ? d.lastError : "No errors",
    time:          hasJsonError ? d.lastErrorTime : "-",
    level:         hasJsonError ? (recentJsonError ? "error" : "neutral") : "ok",
    glow:          recentJsonError,
    jsonError:     null,
    jsonErrorTime: null
  };
}

// Display mapping helpers
function lensName(id) {
  switch (id) {
    case 101: return "Wide";
    case 102: return "Linear";
    case 19:  return "Narrow";
    case 31:  return "Wide 27 MP";
    case 32:  return "Linear 27 MP";
    case 40:  return "Ultra Wide 13MP";
    case 44:  return "Ultra Linear 13MP";
    default:  return "Unknown";
  }
}

function photoOutputName(id) {
  switch (id) {
    case 0: return "Standard";
    case 1: return "RAW";
    case 2: return "HDR";
    case 3: return "SuperPhoto";
    default: return "Unknown";
  }
}

function goproModelName(code) {
  switch (code) {
    case 10: return "HERO10 Black";
    case 11: return "HERO11 Black";
    case 12: return "HERO12 Black";
    case 13: return "HERO13 Black";
    default: return "-";
  }
}

function goproModelImage(code) {
  switch (code) {
    case 10: return "img/hero10.png";
    case 11: return "img/hero11.png";
    case 12: return "img/hero12.png";
    case 13: return "img/hero13.png";
    default: return "";
  }
}

function wifiQualityLabel(q) {
  const v = Number(q ?? 0);
  if (v <= 0)  return "Offline";
  if (v >= 80) return "Excellent";
  if (v >= 60) return "Good";
  if (v >= 40) return "Fair";
  return "Weak";
}

function wifiQualityClass(q) {
  const v = Number(q ?? 0);
  if (v <= 0)  return "text-muted";
  if (v >= 60) return "text-default";
  if (v >= 40) return "text-warning";
  return "text-danger";
}

function batteryClass(pct) {
  if (pct >= 40) return "text-default";
  if (pct >= 15) return "text-warning";
  return "text-danger";
}

function failureTextClass(count) {
  return (count || 0) > 0 ? "text-danger" : "text-default";
}

function panelStateTextClass(level) {
  if (level === "error") return "text-danger";
  if (level === "warn") return "text-warning";
  return "text-muted";
}

function alertClass(err) {
  if (!err.hasError) return "";
  if (err.level === "error") return "alert-error";
  if (err.level === "warn") return "alert-warn";
  return "alert-neutral";
}

function sdLevelClass(d) {
  const pct = sdUsagePercent(d);
  if (pct < 70) return "sd-ok";
  if (pct < 90) return "sd-warn";
  return "sd-error";
}

function renderDays(daysStr) {
  const labels = ["M","T","W","T","F","S","S"];
  return labels.map((label, i) => {
    const active = !!daysStr && daysStr[i] && daysStr[i] !== "-";
    return active
      ? `<span class="day-active">${label}</span>`
      : `<span class="day-inactive">${label}</span>`;
  }).join(" ");
}

// Panel interactions
function toggle(el) {
  const id = el.dataset.id;
  el.classList.toggle("open");
  openState[id] = el.classList.contains("open");
}

function toggleAllPanels() {
  expandAll = !expandAll;
  document.getElementById("toggleAllBtn").innerText = expandAll ? "Compact" : "Expand all";
  Object.keys(devices).forEach(id => { openState[id] = expandAll; });
  render();
}

// Camera modal
function openCameraModal(id) {
  const d = devices[id];
  if (!d) return;

  const g = d.gopro;
  document.getElementById("camInfoModel").innerText = goproModelName(g.m);
  document.getElementById("camInfoFw").innerText    = g.fw  || "-";
  document.getElementById("camInfoSn").innerText    = g.sn  || "-";
  document.getElementById("camInfoMac").innerText   = g.mac || "-";

  const img = document.getElementById("camImage");
  const src = goproModelImage(g.m);
  if (src) {
    img.src = src;
    img.hidden = false;
  } else {
    img.hidden = true;
    img.removeAttribute("src");
  }

  document.getElementById("cameraModal").classList.add("is-visible");
}

function closeCameraModal() {
  document.getElementById("cameraModal").classList.remove("is-visible");
}

document.addEventListener("click", (e) => {
  const cameraModal = document.getElementById("cameraModal");
  const configModal = document.getElementById("configModal");
  if (cameraModal.classList.contains("is-visible") && e.target === cameraModal) closeCameraModal();
  if (configModal.classList.contains("is-visible") && e.target === configModal) closeConfigModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeCameraModal(); closeConfigModal(); }
});

// Render
// Skip unchanged snapshots to avoid unnecessary DOM rebuilds and focus loss.
let lastRenderSnapshot = "";

function buildSnapshot() {
  return JSON.stringify(
    Object.keys(devices).map(id => {
      const d = devices[id];
      const s = status(d, id);
      return {
        id,
        s,
        lastSeenDevice: d.lastSeenDevice,
        batteryPct:     d.batteryPct,
        rtcTempC:       d.rtcTempC,
        wifiQuality:    d.wifiQuality,
        photosSuccessful: d.photosSuccessful,
        sdPhotoCount:     d.sdPhotoCount,
        photosFailed:   d.photosFailed,
        sdFreeMB:       d.sdFreeMB,
        sdTotalMB:      d.sdTotalMB,
        lastShotOk:     d.lastShotOk,
        lastError:      d.lastError,
        lastErrorTime:  d.lastErrorTime,
        open:           !!openState[id]
      };
    })
  );
}

function render() {
  const snapshot = buildSnapshot();

  // if (snapshot === lastRenderSnapshot) return;
  lastRenderSnapshot = snapshot;

  const container = document.getElementById("devices");
  container.innerHTML = "";

  Object.keys(devices).forEach(id => {
    const d = devices[id];
    if (!d.config) return;

    const s   = status(d, id);
    const err = effectiveErrorInfo(d, id, s);

    const isCommIssue = (s === "warn" || s === "error");
    const isJsonError = err.hasError && !isCommIssue;

    // Device panels use the highest severity from communication and JSON status.
    const severityOf = level => ({ ok: 1, idle: 0, warn: 2, error: 3 }[level] ?? 0);
    const errLevel   = err.hasError && (err.level === "error" || err.level === "warn") ? err.level : s;
    const panelState = [s, errLevel].reduce((a, b) => severityOf(a) >= severityOf(b) ? a : b);

    const dev = document.createElement("div");
    dev.className    = "device " + panelState;
    dev.dataset.id   = id;

    // Auto-open errors until the user manually chooses a panel state.
    const userHasInteracted = Object.prototype.hasOwnProperty.call(openState, id);
    const shouldOpen = userHasInteracted ? openState[id] : (expandAll || panelState === "error");

    if (shouldOpen) dev.classList.add("open");

    const alertBannerHtml = `
      <div class="alert-banner ${alertClass(err)} ${err.glow ? "glow" : ""}">
        <b>${err.hasError ? "Alert:" : "No alerts"}</b>
        ${err.hasError ? `
          <span>${err.text}</span>
          <span class="alert-time">${formatDateTime(err.time)}</span>
          ${err.jsonError ? `
            <span class="secondary-alert">Also: ${err.jsonError} @ ${formatDateTime(err.jsonErrorTime)}</span>
          ` : ""}
        ` : ""}
      </div>
    `;

    dev.innerHTML = `
      <div class="header" onclick="toggle(this.parentElement)">
        <b>${id}</b>
        <span class="header-metrics">
          ${panelState !== "ok" ? `
            ${isCommIssue ? `
              <i class="fa-solid fa-tower-broadcast ${panelStateTextClass(panelState)}"></i>
              <span>${s === "warn" ? "DELAY" : "LOST"}</span>
            ` : isJsonError ? `
              <i class="fa-solid fa-circle-xmark text-danger"></i>
              <span>ERROR</span>
            ` : panelState !== "ok" ? `
              <i class="fa-solid fa-clock text-muted"></i>
              <span>IDLE</span>
            ` : ""}
          ` : ""}

          <span class="photo-metric">
            <i class="fa-solid fa-camera metric-icon"></i>
            <span>${d.photosSuccessful}</span>
            ${(d.photosFailed || 0) > 0 ? `
              <span class="photo-failures">(${d.photosFailed})</span>
            ` : ""}
          </span>

          <i class="fa-solid fa-wifi"
            title="Wi-Fi ${wifiQualityLabel(d.wifiQuality)} (${d.wifiQuality ?? 0}%)"
            class="${wifiQualityClass(d.wifiQuality)}"></i>

          <i class="fa-solid ${
            d.batteryPct >= 90 ? "fa-battery-full" :
            d.batteryPct >= 65 ? "fa-battery-three-quarters" :
            d.batteryPct >= 40 ? "fa-battery-half" :
            d.batteryPct >= 15 ? "fa-battery-quarter" :
            "fa-battery-empty"
          } ${batteryClass(d.batteryPct)}" title="Battery ${d.batteryPct}%"></i>
        </span>
      </div>

      <div class="content">
        ${alertBannerHtml}

        <div class="sections">

          <div class="section">
            <div class="section-icon"><i class="fa-solid fa-heart-pulse"></i></div>
            <div class="section-body">

              <div class="row"><span>Last Photo:</span><span>${formatDateTime(d.lastShotOk)}</span></div>
              <div class="row"><span>Confirmed Photos:</span><span>${d.photosSuccessful}</span></div>
              <div class="row">
                <span>Failed Photos:</span>
                <span class="${failureTextClass(d.photosFailed)}">
                  ${d.photosFailed || 0}
                </span>
              </div>
              <div class="row"><span>Last Comm.:</span><span>${relativeTime(d.lastSeenDevice)}</span></div>
              <div class="row"><span>Next Comm.:</span><span>${formatDateTime(nextScheduledConnection(d))}</span></div>
              <div class="row">
                <span>Battery:</span>
                <span class="${batteryClass(d.batteryPct)}">${d.batteryPct}%</span>
              </div>
              <div class="row">
                <span>Temperature:</span>
                <span>${d.rtcTempC == null ? "-" : d.rtcTempC.toFixed(2) + "°C"}</span>
              </div>
              <div class="row">
                <span>Wi-Fi:</span>
                <span class="${wifiQualityClass(d.wifiQuality)}">
                  ${wifiQualityLabel(d.wifiQuality)} (${d.wifiQuality ?? 0}%)
                </span>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-icon"><i class="fa-solid fa-calendar-days"></i></div>
            <div class="section-body">
              <div class="row"><span>Days of the week:</span><span>${renderDays(d.config.days)}</span></div>
              <div class="row"><span>Time Window:</span><span>${d.config.start} → ${d.config.end}</span></div>
              <div class="row"><span>Every:</span><span>${d.config.interval ? d.config.interval + "s" : "-"}</span></div>
            </div>
          </div>

          <div class="section section-clickable" onclick="openCameraModal('${id}')">
            <div class="section-icon"><i class="fa-solid fa-camera"></i></div>
            <div class="section-body">
              <div class="row sd-row">
                <div class="sd-wrap">
                  <i class="fa-solid fa-sd-card"></i>
                  <progress class="sd-progress ${sdLevelClass(d)}" value="${sdUsagePercent(d)}" max="100"></progress>
                  <span class="sd-summary">
                    ${formatFreeSmart(d.sdFreeMB)} / ${formatTotalGB(d.sdTotalMB)}
                  </span>
                </div>
              </div>
              <div class="row"><span>Photos in SD:</span><span>${d.sdPhotoCount}</span></div>
              <div class="row"><span>Lens:</span><span>${lensName(d.config.lens)}</span></div>
              <div class="row"><span>Format:</span><span>${photoOutputName(d.config.output)}</span></div>
            </div>
          </div>
        </div>

        <div class="clear-actions">
          <button class="clear-device-btn" onclick="clearDeviceState(event, '${id}')">Clear Device</button>
        </div>
      </div>
    `;

    container.appendChild(dev);
  });
}

// Boot
render();

setInterval(() => {
  if (!uiLocked) render();
}, 1000);

if (typeof Notification !== "undefined" && Notification.permission !== "granted") {
  Notification.requestPermission();
}

(async () => {
  const cfg = await loadConfig();
  if (!cfg || !cfg.url || !cfg.username) {
    openConfigModal(cfg || {});
    return;
  }
  connectMQTT(cfg);
})();
</script>

</body>
</html>
