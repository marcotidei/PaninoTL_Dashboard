

<!DOCTYPE html>
<html>
<head>
  <title>PaninoTL Dashboard</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .device {
      background: #1e293b;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      cursor: pointer;
    }

    .content {
      padding: 12px;
      border-top: 1px solid #334155;
      display: none;
    }

    .open .content {
      display: block;
    }

    .bar {
      height: 8px;
      border-radius: 4px;
      margin: 6px 0;
    }

    .error { border-left: 5px solid red; }
    .warn { border-left: 5px solid orange; }
    .ok { border-left: 5px solid limegreen; }
    .idle { border-left: 5px solid deepskyblue; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>📡 PaninoTL Dashboard</h1>

<div id="devices"></div>

<script>
const client = mqtt.connect("wss://63f5450f2daa43c191b14e9602fcf094.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "dashboard",
  password: "WebDashboard2026"
});

const devices = {};
const notified = {};

client.on("connect", () => {
  console.log("Connected");
  client.subscribe("#");
});

client.on("message", (topic, message) => {
  try {
    console.log(topic, message.toString());
    const data = JSON.parse(message.toString());
    const id = data.status.deviceId;

    devices[id] = {
      ...data.status,
      config: data.config,
      lastUpdate: Date.now()
    };
  } catch {}
});

function batteryColor(p) {
  return p > 60 ? "limegreen" : p > 30 ? "orange" : "red";
}

function lastSeen(t) {
  let diff = Math.floor((Date.now() - t)/1000);
  if (diff < 10) return "now";
  if (diff < 60) return diff+"s";
  if (diff < 3600) return Math.floor(diff/60)+"m";
  return Math.floor(diff/3600)+"h";
}

function nextExpected(d) {
  let last = new Date(d.lastShotOk.replace(" ","T"));
  return new Date(last.getTime() + d.config.interval*1000);
}

function status(dev,id) {
  let next = nextExpected(dev);
  let now = new Date();
  let buffer = dev.config.interval*1.5;

  let gap = (next-now)/1000;
  if (gap > buffer*2) return "idle";

  if (now <= next) {
    notified[id]=false;
    return "ok";
  }

  let diff = (now-next)/1000;

  if (diff <= buffer) return "warn";

  if (!notified[id]) {
    if (Notification.permission === "granted") {
      new Notification("Device "+id+" missed check");
    }
    notified[id]=true;
  }

  return "error";
}

function toggle(el) {
  el.classList.toggle("open");
}

function render() {
  const container = document.getElementById("devices");
  container.innerHTML = "";

  Object.keys(devices).forEach(id => {
    const d = devices[id];
    const s = status(d,id);

    const dev = document.createElement("div");
    dev.className = "device "+s;

    dev.innerHTML = `
      <div class="header" onclick="toggle(this.parentElement)">
        <b>${id}</b>
        <span>${s.toUpperCase()} • 🔋 ${d.batteryPct}%</span>
      </div>

      <div class="content">
        <div class="row"><span>Photos</span><span>${d.sdPhotoCount}</span></div>
        <div class="row"><span>Last Shot</span><span>${d.lastShotOk}</span></div>
        <div class="row"><span>Last Seen</span><span>${lastSeen(d.lastUpdate)}</span></div>
        <div class="row"><span>Next Expected</span><span>${nextExpected(d).toLocaleTimeString()}</span></div>

        <div class="row">Battery</div>
        <div class="bar" style="background:${batteryColor(d.batteryPct)}; width:${d.batteryPct}%"></div>
      </div>
    `;

    container.appendChild(dev);
  });
}

setInterval(render,1000);

if (Notification.permission !== "granted") {
  Notification.requestPermission();
}
</script>

</body>
</html>
